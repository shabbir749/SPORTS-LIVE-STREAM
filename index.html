<body>

    <div class="container">

            <div class="social-buttons">
                <!-- আপনার ফেসবুক লিংক বসান -->
                <a href="https://facebook.com/shabbiraornov7" target="_blank" class="btn-social btn-fb">
                    <i class="fa-brands fa-facebook"></i> Follow on Facebook

                <!-- আপনার টেলিগ্রাম লিংক বসান -->

        <!-- Video Player Frame -->
<div class="player-wrapper">
    <!-- এখানে autoplay এর সাথে muted যোগ করা হয়েছে যাতে ব্রাউজার ব্লক না করে -->
    <video id="video" controls autoplay muted poster="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1200&auto=format&fit=crop"></video>
</div>

        <!-- Server Switcher (As seen in Screenshot) -->
        <div class="server-container">
            <div class="server-list">
                <button class="server-btn active" onclick="switchServer('https://d1kep4defqj6r1.cloudfront.net/out/v1/4e21d5a122c549289dd6feab259266e8/index.m3u8', this)">Server 1 <span class="hd-tag">HD</span></button>
                <button class="server-btn" onclick="switchServer('https://sm-monirul.top/tof/live/toffee4/index.m3u8', this)">Server 2 <span class="hd-tag">HD</span></button>
                <button class="server-btn" onclick="switchServer('YOUR_M3U8_URL_3', this)">Server 3 <span class="hd-tag">HD</span></button>

            </div>

    <script>
    const video = document.getElementById("video");
    let hls = null;

    // প্রথম সার্ভারের ডিফল্ট লিংক এখানে দিন
    const defaultStream ="https://d1kep4defqj6r1.cloudfront.net/out/v1/4e21d5a122c549289dd6feab259266e8/index.m3u8"; 

    function loadStream(url) {
        if (Hls.isSupported()) {
            if (hls) { hls.destroy(); }
            hls = new Hls({ maxMaxBufferLength: 10 });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                // অটোমেটিক প্লে করার সর্বোচ্চ চেষ্টা
                let playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Autoplay blocked, muting to force play...");
                        video.muted = true; // ব্লক করলে মিউট করে প্লে করানো হবে
                        video.play();
                    });
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }
    }

    function switchServer(url, button) {
        document.querySelectorAll('.server-btn').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        loadStream(url);
    }

    window.onload = function() {
        loadStream(defaultStream);
    };
</script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // আপনার প্রজেক্টের সঠিক কনফিগারেশন (v8 ফরম্যাটে সাজানো)
    const firebaseConfig = {
        apiKey: "AIzaSyCBmtFfie1mWxJEDSvr8pykRWX6V8M2eNI",
        authDomain: "shaor-sports-live-stream.firebaseapp.com",
        // আপনার প্রোজেক্ট আইডি অনুযায়ী ডাটাবেজ ইউআরএল যোগ করা হয়েছে
        databaseURL: "https://shaor-sports-live-stream-default-rtdb.firebaseio.com", 
        projectId: "shaor-sports-live-stream",
        storageBucket: "shaor-sports-live-stream.firebasestorage.app",
        messagingSenderId: "473227127790",
        appId: "1:473227127790:web:236c005cabbaee55047cff"
    };

    // Firebase ইনিশিয়ালাইজ করা
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // প্রতি ভিজিটরের জন্য ইউনিক আইডি জেনারেট করা
    const myConnectionRef = database.ref('live_users/' + Math.random().toString(36).substring(7));
    const connectedRef = database.ref('.info/connected');
    const totalWatchingRef = database.ref('total_live_watching');

    // লাইভ ইউজার কাউন্ট লজিক
    connectedRef.on('value', (snap) => {
        if (snap.val() === true) {
            // ইউজার লাইভ আসলে ডাটাবেজে ১ যোগ হবে
            myConnectionRef.set(true);
            totalWatchingRef.transaction((currentCount) => (currentCount || 0) + 1);

            // ইউজার পেজ বা মিনি অ্যাপ বন্ধ করলে স্বয়ংক্রিয়ভাবে মাইনাস হবে
            myConnectionRef.onDisconnect().remove();
            totalWatchingRef.onDisconnect().transaction((currentCount) => (currentCount ? currentCount - 1 : 0));
        }
    });

    // ডাটাবেজের লাইভ সংখ্যাটি স্ক্রিনে দেখানোর জন্য
    totalWatchingRef.on('value', (snapshot) => {
        const count = snapshot.val() || 1;
        const counterElement = document.querySelector('.badge-watching');
        if (counterElement) {
            counterElement.innerHTML = `<i class="fa-solid fa-eye"></i> ${formatCount(count)}`;
        }
    });

    // ১০০০ পার হলে 1K, 2.4K দেখানোর ফাংশন
    function formatCount(num) {
        return num >= 1000 ? (num / 1000).toFixed(1) + 'K' : num;
    }
</script>
