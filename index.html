<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Streaming Center</title>
    
    <!-- hls.js for M3U8 streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <!-- Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- External CSS link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <!-- Top Status & Social Buttons (As seen in Screenshot) -->
        <div class="top-bar">
            <div class="status-badges">
                <span class="badge-live">🔴 LIVE</span>
                <span class="badge-watching"><i class="fa-solid fa-eye"></i> 2.4K</span>
            </div>
            
            <div class="social-buttons">
                <!-- আপনার ফেসবুক লিংক বসান -->
                <a href="https://facebook.com/shabbiraornov7" target="_blank" class="btn-social btn-fb">
                    <i class="fa-brands fa-facebook"></i> Follow on Facebook
                </a>
                <!-- আপনার টেলিগ্রাম লিংক বসান -->
                <a href="https://t.me/fifa_world_cup_2026_live_update" target="_blank" class="btn-social btn-tg">
                    <i class="fa-brands fa-telegram"></i> Follow on Telegram
                </a>
            </div>
        </div>

        <!-- Video Player Frame -->
<div class="player-wrapper">
    <!-- এখানে autoplay এর সাথে muted যোগ করা হয়েছে যাতে ব্রাউজার ব্লক না করে -->
    <video id="video" controls autoplay muted poster="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1200&auto=format&fit=crop"></video>
</div>

        <!-- Server Switcher (As seen in Screenshot) -->
        <div class="server-container">
            <div class="server-list">
                <button class="server-btn active" onclick="switchServer('https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/0/master_1750.m3u8', this)">Server 1 <span class="hd-tag">HD</span></button>
                <button class="server-btn" onclick="switchServer('YOUR_M3U8_URL_2', this)">Server 2 <span class="hd-tag">HD</span></button>
                <button class="server-btn" onclick="switchServer('YOUR_M3U8_URL_3', this)">Server 3 <span class="hd-tag">HD</span></button>
                <button class="server-btn" onclick="switchServer('YOUR_M3U8_URL_4', this)">Server 4 <span class="hd-tag">HD</span></button>
            </div>
        </div>

    </div>

    <script>
    const video = document.getElementById("video");
    let hls = null;

    // প্রথম সার্ভারের ডিফল্ট লিংক এখানে দিন
    const defaultStream = "https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/0/master_1750.m3u8"; 

    function loadStream(url) {
        if (Hls.isSupported()) {
            if (hls) { hls.destroy(); }
            hls = new Hls({ maxMaxBufferLength: 10 });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                // অটোমেটিক প্লে করার সর্বোচ্চ চেষ্টা
                let playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Autoplay blocked, muting to force play...");
                        video.muted = true; // ব্লক করলে মিউট করে প্লে করানো হবে
                        video.play();
                    });
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }
    }

    function switchServer(url, button) {
        document.querySelectorAll('.server-btn').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        loadStream(url);
    }

    window.onload = function() {
        loadStream(defaultStream);
    };
</script>
</body>
                </html>
